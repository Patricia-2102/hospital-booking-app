<!DOCTYPE html>
<html>
<head>
  <title>Hospital Appointment Booking</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <!-- QR Code -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 360px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .book { background: #2e86de; }
    .cancel { background: #e74c3c; }
    .reschedule { background: #f39c12; }

    #result {
      margin-top: 10px;
      text-align: center;
      font-weight: bold;
    }

    #selectionInfo {
      text-align: center;
      margin-top: 8px;
      color: #2e86de;
      font-size: 14px;
    }

    #rescheduleBox {
      display: none;
      margin-top: 15px;
      border-top: 1px solid #ccc;
      padding-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Book Appointment</h2>

  <input id="name" placeholder="Full Name">
  <input id="age" placeholder="Age">

  <select id="gender">
    <option value="">Gender</option>
    <option>Male</option>
    <option>Female</option>
  </select>

  <select id="marital">
    <option value="">Marital Status</option>
    <option>Single</option>
    <option>Married</option>
  </select>

  <input id="contact" placeholder="Phone">

  <select id="doctor" onchange="updateTimeSlots()">
    <option value="">Select Doctor</option>
    <option value="Dr. John">Dr. John</option>
    <option value="Dr. Sarah">Dr. Sarah</option>
    <option value="Dr. David">Dr. David</option>
  </select>

  <select id="time" onchange="showSelectedTime()">
    <option value="">Select Time</option>
  </select>

  <div id="selectionInfo"></div>

  <button class="book" onclick="book()">Book Appointment</button>
  <button class="cancel" onclick="cancelAppointment()">Cancel Appointment</button>
  <button class="reschedule" onclick="rescheduleAppointment()">Reschedule</button>

  <div id="result"></div>
  <canvas id="qr"></canvas>

  <!-- Reschedule UI -->
  <div id="rescheduleBox">
    <h3>Reschedule</h3>

    <select id="newDoctor" onchange="loadNewTimes()">
      <option value="">Select Doctor</option>
      <option value="Dr. John">Dr. John</option>
      <option value="Dr. Sarah">Dr. Sarah</option>
      <option value="Dr. David">Dr. David</option>
    </select>

    <select id="newTime">
      <option value="">Select Time</option>
    </select>

    <button onclick="confirmReschedule()">Confirm Reschedule</button>
  </div>

</div>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCJCkqLqUEH1lt0rNqw6Po4ooZPbHEyCFE",
    authDomain: "hospital-booking-system-6cc3e.firebaseapp.com",
    projectId: "hospital-booking-system-6cc3e"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const schedules = {
    "Dr. John": ["09:00 AM", "10:00 AM", "11:00 AM"],
    "Dr. Sarah": ["01:00 PM", "02:00 PM", "03:00 PM"],
    "Dr. David": ["04:00 PM", "05:00 PM", "06:00 PM"]
  };

  let currentRescheduleID = null;

  function updateTimeSlots() {
    let doctor = document.getElementById("doctor").value;
    let time = document.getElementById("time");
    let info = document.getElementById("selectionInfo");

    time.innerHTML = "<option value=''>Select Time</option>";

    if (doctor) {
      info.innerHTML = "👨‍⚕️ " + doctor + " selected. Choose time.";
    } else {
      info.innerHTML = "";
    }

    if (schedules[doctor]) {
      schedules[doctor].forEach(t => {
        let opt = document.createElement("option");
        opt.value = t;
        opt.text = t;
        time.appendChild(opt);
      });
    }
  }

  function showSelectedTime() {
    let time = document.getElementById("time").value;
    let info = document.getElementById("selectionInfo");

    if (time) {
      info.innerHTML += "<br>⏰ Time: <b>" + time + "</b>";
    }
  }

  function loadNewTimes() {
    let doctor = document.getElementById("newDoctor").value;
    let time = document.getElementById("newTime");

    time.innerHTML = "<option>Select Time</option>";

    if (schedules[doctor]) {
      schedules[doctor].forEach(t => {
        let opt = document.createElement("option");
        opt.value = t;
        opt.text = t;
        time.appendChild(opt);
      });
    }
  }

  function book() {
    let name = document.getElementById("name").value;
    let doctor = document.getElementById("doctor").value;
    let time = document.getElementById("time").value;

    if (!name || !doctor || !time) {
      alert("Fill all required fields");
      return;
    }

    let id = "PAT" + Math.floor(Math.random() * 10000);

    db.collection("appointments").doc(id).set({
      name, doctor, time, id
    })
    .then(() => {
      document.getElementById("result").innerHTML =
        "✅ Booked!<br>ID: <b>" + id + "</b>";

      QRCode.toCanvas(document.getElementById("qr"), id);

      alert("Appointment booked!");
    })
    .catch(err => alert(err));
  }

  function cancelAppointment() {
    let id = prompt("Enter Patient ID");

    if (!id) return;

    let ref = db.collection("appointments").doc(id);

    ref.get().then(doc => {
      if (!doc.exists) {
        alert("❌ Not found");
        return;
      }

      ref.delete().then(() => alert("✅ Cancelled"));
    });
  }

  function rescheduleAppointment() {
    let id = prompt("Enter Patient ID");

    if (!id) return;

    let ref = db.collection("appointments").doc(id);

    ref.get().then(doc => {
      if (!doc.exists) {
        alert("❌ Not found");
        return;
      }

      currentRescheduleID = id;
      document.getElementById("rescheduleBox").style.display = "block";
    });
  }

  function confirmReschedule() {
    let doctor = document.getElementById("newDoctor").value;
    let time = document.getElementById("newTime").value;

    if (!doctor || !time) {
      alert("Select doctor & time");
      return;
    }

    db.collection("appointments").doc(currentRescheduleID).update({
      doctor, time
    })
    .then(() => {
      alert("✅ Rescheduled");
      document.getElementById("rescheduleBox").style.display = "none";
    });
  }
</script>

</body>
</html>
